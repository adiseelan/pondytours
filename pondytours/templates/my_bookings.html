{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <h2>My Bookings</h2>
    <hr>

    {% if bookings %}
        {% for booking in bookings %}
            <div class="card mb-3 p-3">
                <h5>{{ booking.tour.name }}</h5>
                <p>Date: {{ booking.date }}</p>
                <p>Status: {{ booking.status }}</p>
            </div>
        {% endfor %}
    {% else %}
        <p>No bookings found.</p>
    {% endif %}
</div>
{% endblock %}
